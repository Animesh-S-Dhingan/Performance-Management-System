<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #1e293b; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .header { background-color: #ef4444; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>⚠️ Escalation Notice</h2>
        </div>
        <div class="content">
            <p>This is an automated escalation notice regarding outstanding tasks in the PMS Platform.</p>
            <p><strong>Action Required:</strong> {{ message }}</p>
            <p>This item has exceeded the allowed SLA and requires immediate attention.</p>
        </div>
    </div>
</body>
</html>
